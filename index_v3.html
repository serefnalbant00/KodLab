<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Senin istediğin o özel başlık -->
    <title>İndeks | Kodlab v3.0</title>
    
    <style>
        /* TASARIM (CSS) */
        body { background-color: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { width: 95%; max-width: 800px; background: #1e293b; padding: 25px; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); border: 1px solid #334155; }
        h1 { color: #38bdf8; text-align: center; letter-spacing: 2px; margin-bottom: 5px; }
        .version { text-align: center; color: #94a3b8; font-size: 0.8rem; margin-bottom: 20px; }
        textarea { width: 100%; height: 150px; background: #020617; color: #34d399; border: 1px solid #334155; border-radius: 10px; padding: 15px; font-family: monospace; resize: none; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        button { background: linear-gradient(45deg, #0ea5e9, #2563eb); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1rem; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        #terminal { background: #000; color: #38bdf8; padding: 15px; border-radius: 10px; margin-top: 20px; font-family: monospace; height: 120px; overflow-y: auto; font-size: 13px; border-left: 4px solid #38bdf8; }
        iframe { width: 100%; height: 200px; background: white; border-radius: 10px; margin-top: 20px; border: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>KODLAB 3.0</h1>
        <div class="version">Sesli Denetim Sistemi | v3.0 Stable</div>
        
        <textarea id="kod-input" placeholder="HTML/CSS kodunu buraya yaz..."></textarea>
        <button onclick="tamDenetimliCalistir()">Simülasyonu Başlat</button>
        
        <div id="terminal">> Sistem hazır. Komut bekleniyor...</div>
        <iframe id="onizleme-frame"></iframe>
    </div>

    <!-- SES EFEKTLERİ (Tarayıcı üzerinden hazır sesler) -->
    <audio id="sound-success" src="https://www.soundjay.com/buttons/sounds/button-37a.mp3"></audio>
    <audio id="sound-error" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>
    <audio id="sound-click" src="https://www.soundjay.com/buttons/sounds/button-50.mp3"></audio>

    <script>
        // MANTIK VE DOĞRULAMA (JS)
        function tamDenetimliCalistir() {
            const editor = document.getElementById("kod-input"); 
            const terminal = document.getElementById("terminal");
            const onizleme = document.getElementById("onizleme-frame");
            const kod = editor.value.trim();
            
            // Sesleri tanımla
            const sSuccess = document.getElementById("sound-success");
            const sError = document.getElementById("sound-error");
            const sClick = document.getElementById("sound-click");

            sClick.play(); // Butona basılma sesi

            // 1. ADIM: DOĞRULAMA (Validation)
            const htmlRegex = /<[a-z][\s\S]*>/i; 
            if (kod.length < 3 || (!htmlRegex.test(kod) && !kod.includes("{"))) {
                sError.play(); // Hata sesi
                terminal.innerHTML = `<span style="color:#ef4444;">[KRİTİK HATA]: Geçersiz Kod Yapısı!</span><br>
                                      <span style="color:#94a3b8;">> Sistem "Aa" veya boş veri girişini reddetti.</span>`;
                return; 
            }

            // 2. ADIM: TERMİNAL AKIŞI
            terminal.innerHTML = "<b style='color:#fbbf24;'>[ANALİZ]: Kodlar taranıyor...</b>";
            
            let islemler = [
                "> Güvenlik protokolleri devrede...",
                "> Sözdizimi doğrulandı.",
                "> Çıktı hazırlanıyor..."
            ];
            
            let i = 0;
            let akis = setInterval(() => {
                if (i < islemler.length) {
                    terminal.innerHTML += `<div>${islemler[i]}</div>`;
                    i++;
                } else {
                    clearInterval(akis);
                    sSuccess.play(); // Başarı sesi
                    terminal.innerHTML += "<div style='color:#22c55e;'>[BAŞARILI]: Proje yayınlandı!</div>";
                    
                    // 3. ADIM: SONUÇ GÖSTERİMİ
                    const doc = onizleme.contentWindow.document;
                    doc.open();
                    doc.write(kod); 
                    doc.close();
                }
            }, 400);
        }
    </script>
</body>
          </html>
