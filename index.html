<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KodLab - Mobil Kod Editörü</title>
    <style>
        /* KodLab Dark Tema */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc; 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            box-sizing: border-box;
            overflow: hidden;
        }
        header { 
            text-align: center; 
            padding: 5px; 
            border-bottom: 2px solid #334155; 
            margin-bottom: 10px; 
        }
        h1 { margin: 0; color: #38bdf8; font-size: 22px; text-transform: uppercase; letter-spacing: 2px; }
        .tagline { font-size: 10px; color: #94a3b8; }
        
        .label { font-size: 12px; font-weight: bold; color: #cbd5e1; margin: 5px 0; }
        
        textarea { 
            width: 100%; 
            height: 30%; 
            background: #1e293b; 
            color: #f1f5f9; 
            border: 1px solid #475569; 
            border-radius: 10px; 
            padding: 10px; 
            font-family: 'Courier New', monospace; 
            font-size: 14px; 
            outline: none; 
            box-sizing: border-box;
            resize: none;
        }
        
        button { 
            background: linear-gradient(90deg, #0ea5e9 0%, #2563eb 100%); 
            color: white; 
            border: none; 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 10px; 
            font-weight: bold; 
            font-size: 15px; 
            cursor: pointer; 
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }
        button:active { transform: scale(0.98); opacity: 0.9; }
        
        #output { 
            flex-grow: 1; 
            background: white; 
            border-radius: 10px; 
            border: none; 
            width: 100%; 
            margin-top: 5px;
        }
    </style>
</head>

        <div class="tagline">Mobil Yazılım Atölyesi v1.0</div>
    </header>
