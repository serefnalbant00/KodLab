<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siber Geliştirici Portalı v2.0</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --accent: #58a6ff;
            --success: #238636;
            --editor-bg: #010409;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #30363d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .hidden { display: none; }

        #welcome-screen, #tutorial-screen { text-align: center; }
        
        .btn-start {
            background: var(--success);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }

        .tutorial-step {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-left: 4px solid var(--accent);
            margin: 15px 0;
            text-align: left;
        }

        .status-dot { width: 10px; height: 10px; background: var(--success); border-radius: 50%; display: inline-block; margin-right: 5px; }
        
        .tab-group { display: flex; gap: 5px; margin-bottom: 0px; }
        .tab {
            background: #21262d;
            padding: 8px 15px;
            border-radius: 5px 5px 0 0;
            font-size: 12px;
            border: 1px solid #30363d;
            border-bottom: none;
        }

        textarea {
            width: 100%;
            height: 300px;
            background: var(--editor-bg);
            color: #7ee787;
            border: 1px solid #30363d;
            border-radius: 0 0 8px 8px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            box-sizing: border-box;
            resize: none;
            outline: none;
        }

        .action-bar { margin-top: 20px; display: flex; gap: 10px; }
        .btn-run { background: var(--accent); flex: 2; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-reset { background: #da3633; flex: 1; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }

        code { color: #d2a8ff; background: #21262d; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>

    <div class="container">
        <!-- 1. EKRAN: HOŞ GELDİN -->
        <div id="welcome-screen" class="hidden">
            <h1>Hoş Geldin, <span style="color:var(--accent)">Geliştirici</span></h1>
            <p>Kodlab v2.0 ile siber dünyada yerini al.</p>
            <button class="btn-start" onclick="startTutorial()">Öğrenmeye Başla</button>
        </div>

        <!-- 2. EKRAN: ÖĞRENME -->
        <div id="tutorial-screen" class="hidden">
            <h2>Hızlı Başlangıç</h2>
            <div class="tutorial-step">
                <strong>HTML:</strong> <code>&lt;h1&gt;Baslik&lt;/h1&gt;</code> yapısını kullan.
            </div>
            <div class="tutorial-step">
                <strong>CSS:</strong> Tasarımı <code>style</code> ile yönet.
            </div>
            <button class="btn-start" onclick="goToEditor()">Editörü Aç</button>
        </div>

        <!-- 3. EKRAN: PROFESYONEL EDİTÖR -->
        <div id="editor-screen" class="hidden">
            <h3 style="margin-top:0"><div class="status-dot"></div> Siber IDE v2.0</h3>
            <div class="tab-group">
                <div class="tab">index.html</div>
                <div class="tab" style="opacity:0.4">style.css</div>
            </div>
            <textarea id="main-editor"></textarea>
            
            <div class="action-bar">
                <button class="btn-run" onclick="runCode()">Kodu Çalıştır</button>
                <button class="btn-reset" onclick="resetMemory()">Sıfırla</button>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            if (localStorage.getItem('v2_visited')) {
                showScreen('editor-screen');
                document.getElementById('main-editor').value = "<h1>Tekrar Hos Geldin!</h1>\n<p>Kodlamaya devam et...</p>";
            } else {
                showScreen('welcome-screen');
            }
        };

        function showScreen(id) {
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('tutorial-screen').classList.add('hidden');
            document.getElementById('editor-screen').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        function startTutorial() { showScreen('tutorial-screen'); }
        
        function goToEditor() {
            localStorage.setItem('v2_visited', 'true');
            showScreen('editor-screen');
        }

        function runCode() { alert("Kodlar başarıyla simüle edildi!"); }
        
        function resetMemory() {
            localStorage.removeItem('v2_visited');
            location.reload();
        }
    </script>
</body>
</html>
